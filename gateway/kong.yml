_format_version: "3.0"
_transform: true

services:
  - name: core-service-legacy
    url: http://core-service:8080
    routes:
      - name: core-legacy-route
        paths:
          - /core
        strip_path: true

  - name: core-auth
    url: http://core-service:8080/api/core/auth
    routes:
      - name: auth-v1-route
        paths:
          - /api/v1/auth
        strip_path: true

  - name: core-incidents
    url: http://core-service:8080/api/core/incidents
    routes:
      - name: incidents-v1-route
        paths:
          - /api/v1/incidents
        strip_path: true

  - name: core-vehicles
    url: http://core-service:8080/api/core/vehicles
    routes:
      - name: vehicles-v1-route
        paths:
          - /api/v1/vehicles
        strip_path: true

  - name: core-dispatches
    url: http://core-service:8080/api/core/dispatches
    routes:
      - name: dispatches-v1-route
        paths:
          - /api/v1/dispatches
        strip_path: true

  - name: core-dispatch
    url: http://core-service:8080/api/core/dispatch
