services:
  db:
    image: postgis/postgis:16-3.4
    container_name: urbanshield-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: urbanshield
      POSTGRES_USER: urbanshield
      POSTGRES_PASSWORD: urbanshield_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urbanshield -d urbanshield"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urbanshield-net

  redis:
    image: redis:7-alpine
    container_name: urbanshield-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - urbanshield-net

  core-service:
    build:
      context: ./core-service
    container_name: urbanshield-core-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/urbanshield
      SPRING_DATASOURCE_USERNAME: urbanshield
      SPRING_DATASOURCE_PASSWORD: urbanshield_dev_password
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000
      URBANSHIELD_AUTH_ENABLED: "true"
      URBANSHIELD_AUTH_SECRET: change-me-local-dev-only
      URBANSHIELD_SEED_PASSWORD: UrbanShield123!
      URBANSHIELD_REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/core/health | grep -q 'UP'"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s
    networks:
      - urbanshield-net

  simulation-service:
    build:
      context: ./simulation-service
    container_name: urbanshield-simulation-service
    restart: unless-stopped
    environment:
      SIMULATION_ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:8000"]'
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json, urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8000/api/simulation/health')); raise SystemExit(0 if data.get('status') == 'UP' else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - urbanshield-net

  ai-service:
    build:
      context: ./ai-service
    container_name: urbanshield-ai-service
    restart: unless-stopped
    environment:
      URBANSHIELD_AI_PROVIDER: fallback
      URBANSHIELD_ALLOW_REMOTE_AI: "false"
      AI_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:8000
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import json, urllib.request; data=json.load(urllib.request.urlopen('http://localhost:8010/api/ai/health')); raise SystemExit(0 if data.get('fallbackAvailable') else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - urbanshield-net

  kong:
    image: kong:3.8
    container_name: urbanshield-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./gateway/kong.yml:/kong/declarative/kong.yml:ro
    depends_on:
      core-service:
        condition: service_healthy
      simulation-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - urbanshield-net

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
        NEXT_PUBLIC_SIMULATION_WS_URL: ws://localhost:8000/api/v1/simulations/progress
    container_name: urbanshield-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_SIMULATION_WS_URL: ws://localhost:8000/api/v1/simulations/progress
    ports:
      - "3000:3000"
    depends_on:
      kong:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000', res => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - urbanshield-net

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: urbanshield-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - urbanshield-net

  grafana:
    image: grafana/grafana:11.3.1
    container_name: urbanshield-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: urbanshield
      GF_SECURITY_ADMIN_PASSWORD: urbanshield_dev_password
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - urbanshield-net

networks:
  urbanshield-net:
    driver: bridge

volumes:
  postgres_data:
  grafana_data: